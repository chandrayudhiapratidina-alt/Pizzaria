[build]
builder = "NIXPACKS"
buildCommand = "composer install --optimize-autoloader --no-dev && npm install && npm run build && php artisan view:cache"

[deploy]
startCommand = "php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
releaseCommand = "php artisan storage:link --force && php artisan migrate --force"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
